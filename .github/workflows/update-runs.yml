# Run search periodically and push latest run so GitHub Pages shows current results.
name: Update runs for GitHub Pages

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours
  workflow_dispatch:         # Allow manual run

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run search and update data
        run: python scripts/run_search.py --search

      - name: Sync latest run to docs for GitHub Pages
        run: mkdir -p docs/data && cp data/findings.json docs/data/findings.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/findings.json runs/ docs/data/findings.json
          git diff --staged --quiet || {
            git commit -m "chore: update runs for GitHub Pages (latest from runs/) [automated]"
            git push
          }
